name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t dormfix-backend ./backend

      - name: Run Container Test
        run: docker run -d -p 5000:5000 dormfix-backend