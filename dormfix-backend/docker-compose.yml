version: '3.8'

services:

  backend:
    build: ./backend
    container_name: dormfix_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dormfix_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dormfix
      POSTGRES_USER: dormfix_user
      POSTGRES_PASSWORD: dormfix_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dormfix_user -d dormfix"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin 4 ───────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dormfix_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dormfix.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
